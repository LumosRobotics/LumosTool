ShortDescription: CLI build tool for STM32 embedded systems
Description: |-
  Lumos is a CLI toolchain for building, flashing, and monitoring STM32-based
  embedded systems. It supports the lumos_brain (STM32H7), lumos_micro_brain
  (STM32G0), and sx1281_module (STM32H5) boards with an Arduino-compatible API.
